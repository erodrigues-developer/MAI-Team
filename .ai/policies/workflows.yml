version: 1

states:
  manual:
    - backlog
    - ready
    - dev:in_progress
    - dev:fix_review
    - requirements:approved
    - ui:approved
  automatic:
    - pr:opened
    - pr:ai_reviewed
    - ready_for_tests

transitions:
  - from: dev:in_progress
    to: pr:opened
    trigger: github.issue.labeled
    actor: ai

  - from: pr:opened
    to: pr:ai_reviewed
    trigger: github.checks.ai_review_passed
    actor: ai

  - from: pr:ai_reviewed
    to: ready_for_tests
    trigger: github.checks.qa_passed
    actor: ai

rules:
  branch_naming: "feature/{jira_key}-{slug}"
  pr_base_branch: "dev"
  required_human_approvals: 1
  required_ai_checks:
    - ai-review
    - qa-check
