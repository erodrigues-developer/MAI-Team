name: Jira Sync

on:
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to sync with Jira
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: jira-sync-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.run_id }}
  cancel-in-progress: true

jobs:
  resolve-pr-context:
    runs-on: ubuntu-latest
    outputs:
      jira_key: ${{ steps.resolve.outputs.jira_key }}
      pr_draft: ${{ steps.resolve.outputs.pr_draft }}
      pr_base_ref: ${{ steps.resolve.outputs.pr_base_ref }}
    steps:
      - name: Resolve PR context
        id: resolve
        uses: actions/github-script@v7
        env:
          INPUT_PR_NUMBER: ${{ github.event.inputs.pr_number }}
        with:
          script: |
            let pr;
            if (context.eventName === "workflow_dispatch") {
              const pullNumber = Number(process.env.INPUT_PR_NUMBER);
              const response = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pullNumber
              });
              pr = response.data;
            } else {
              pr = context.payload.pull_request;
            }

            const text = `${pr.title || ""} ${pr.head?.ref || ""}`;
            const match = text.match(/[A-Z][A-Z0-9]+-[0-9]+/);

            core.setOutput("jira_key", match ? match[0] : "");
            core.setOutput("pr_draft", String(Boolean(pr.draft)));
            core.setOutput("pr_base_ref", pr.base?.ref || "");

  move-to-review:
    needs: resolve-pr-context
    if: >
      needs.resolve-pr-context.outputs.jira_key != '' &&
      needs.resolve-pr-context.outputs.pr_draft != 'true' &&
      needs.resolve-pr-context.outputs.pr_base_ref == 'dev'
    runs-on: ubuntu-latest

    steps:
      - name: Move Jira issue to In Review
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_TRANSITION_ID_IN_REVIEW: ${{ secrets.JIRA_TRANSITION_ID_IN_REVIEW }}
          JIRA_KEY: ${{ needs.resolve-pr-context.outputs.jira_key }}
        run: |
          curl --fail --silent --show-error \
            -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
            -H "Content-Type: application/json" \
            -X POST \
            "$JIRA_BASE_URL/rest/api/3/issue/$JIRA_KEY/transitions" \
            -d "{\"transition\":{\"id\":\"$JIRA_TRANSITION_ID_IN_REVIEW\"}}"
