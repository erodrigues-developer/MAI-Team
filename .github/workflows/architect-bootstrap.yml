name: Architect Bootstrap

on:
  issues:
    types: [labeled, opened]
  issue_comment:
    types: [created]

permissions:
  id-token: write
  contents: write
  issues: write
  pull-requests: write
  actions: write

jobs:
  start-interview:
    if: >
      github.event_name == 'issues' &&
      github.event.label.name == 'architect:bootstrap' &&
      github.event.issue.state == 'open'
    runs-on: ubuntu-latest
    steps:
      - name: Post bootstrap interview template
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              "Architect bootstrap iniciado.",
              "",
              "Responda neste issue com um comentário iniciando com `/architect-bootstrap` e preenchendo o template abaixo:",
              "",
              "```md",
              "/architect-bootstrap",
              "system_type: ",
              "language_framework: ",
              "primary_data_store: ",
              "architecture_style: ",
              "testing_strategy: ",
              "dependency_policy: ",
              "security_posture: ",
              "expected_scale: ",
              "deployment_target: ",
              "observability_expectations: ",
              "target_users: ",
              "core_problem_and_value: ",
              "```",
              "",
              "Depois da sua resposta, o workflow vai gerar:",
              "- `.ai/context/project-brief.md`",
              "- `.ai/context/architecture.md`",
              "- `.ai/context/stack.md`",
              "- `.ai/context/coding-style.md`",
              "- `.ai/context/security.md`",
              "",
              "E em seguida disparar `Bootstrap Labels`."
            ].join("\\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

  process-answers:
    if: >
      github.event_name == 'issue_comment' &&
      github.event.issue.state == 'open' &&
      github.event.issue.pull_request == null &&
      contains(github.event.comment.body, '/architect-bootstrap') &&
      contains(join(github.event.issue.labels.*.name, ','), 'architect:bootstrap')
    concurrency:
      group: architect-bootstrap-process-${{ github.event.issue.number }}
      cancel-in-progress: true
    permissions:
      id-token: write
      contents: write
      issues: write
      pull-requests: write
      actions: write
    runs-on: ubuntu-latest
    env:
      ARCHITECT_BOOTSTRAP_PROMPT: |
        You are the Architect Agent running bootstrap for this repository.

        Read and follow:
        - .ai/agents/architect.md
        - .ai/bootstrap/architecture-interview.md
        - .ai/context/project-brief.md (template)
        - .ai/context/architecture.md (template)
        - .ai/context/stack.md (template)
        - .ai/context/coding-style.md (template)
        - .ai/context/security.md (template)

        Source of truth for interview answers is the issue comment body below:
        ---
        ${{ github.event.comment.body }}
        ---

        Tasks:
        1. Parse the answers from the comment.
        2. Generate/update ONLY:
           - .ai/context/project-brief.md
           - .ai/context/architecture.md
           - .ai/context/stack.md
           - .ai/context/coding-style.md
           - .ai/context/security.md
        3. Keep content concise, specific, and internally consistent.
        4. If critical answers are missing, use `TBD` with recommended defaults.
        5. Do not modify unrelated files.
        6. Do not run git commands and do not try to create commits or PRs.
           The workflow will handle PR creation automatically.
        7. Prefer file editing tools over shell commands when updating context files.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve AI configuration
        id: ai_config
        shell: bash
        env:
          AI_PROVIDER: ${{ vars.AI_PROVIDER }}
          AI_MODEL: ${{ vars.AI_MODEL }}
          AI_MODEL_VERSION: ${{ vars.AI_MODEL_VERSION }}
          AI_MODEL_ID: ${{ vars.AI_MODEL_ID }}
        run: .github/scripts/resolve-ai-config.sh

      - name: Print AI configuration
        shell: bash
        run: |
          echo "AI provider: ${{ steps.ai_config.outputs.provider }}"
          echo "AI model: ${{ steps.ai_config.outputs.model_id }}"

      - name: Generate context files with Claude
        if: steps.ai_config.outputs.provider == 'claude'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          claude_args: |
            --model ${{ steps.ai_config.outputs.model_id }}
            --max-turns 20
            --allowedTools Edit,Read,Write,Bash
          prompt: ${{ env.ARCHITECT_BOOTSTRAP_PROMPT }}

      - name: Generate context files with Codex
        if: steps.ai_config.outputs.provider == 'gpt'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: ${{ steps.ai_config.outputs.model_id }}
          sandbox: workspace-write
          prompt: ${{ env.ARCHITECT_BOOTSTRAP_PROMPT }}

      - name: Generate context files with Gemini CLI
        if: steps.ai_config.outputs.provider == 'gemini'
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: ${{ steps.ai_config.outputs.model_id }}
          prompt: ${{ env.ARCHITECT_BOOTSTRAP_PROMPT }}

      - name: Generate context files with Grok
        if: steps.ai_config.outputs.provider == 'grok'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.XAI_API_KEY }}
          responses-api-endpoint: https://api.x.ai/v1/responses
          model: ${{ steps.ai_config.outputs.model_id }}
          sandbox: workspace-write
          prompt: ${{ env.ARCHITECT_BOOTSTRAP_PROMPT }}

      - name: Debug context files after generation
        shell: bash
        run: |
          echo "=== git status (context files) ==="
          git status --porcelain -- \
            .ai/context/project-brief.md \
            .ai/context/architecture.md \
            .ai/context/stack.md \
            .ai/context/coding-style.md \
            .ai/context/security.md || true

          echo "=== preview: project-brief.md ==="
          sed -n '1,80p' .ai/context/project-brief.md || true

      - name: Detect context changes
        id: detect_changes
        shell: bash
        run: |
          CHANGED_COUNT=$(git status --porcelain -- \
            .ai/context/project-brief.md \
            .ai/context/architecture.md \
            .ai/context/stack.md \
            .ai/context/coding-style.md \
            .ai/context/security.md | wc -l | tr -d ' ')

          if [ "$CHANGED_COUNT" -gt 0 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create bootstrap context PR
        id: create_pr
        if: steps.detect_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(bootstrap): generate context from architect interview"
          title: "chore(bootstrap): generate context from architect interview"
          body: |
            Automated architect bootstrap context generation.

            Source issue: #${{ github.event.issue.number }}
          branch: "chore/bootstrap-context-issue-${{ github.event.issue.number }}"
          base: ${{ github.event.repository.default_branch }}
          add-paths: |
            .ai/context/project-brief.md
            .ai/context/architecture.md
            .ai/context/stack.md
            .ai/context/coding-style.md
            .ai/context/security.md

      - name: Trigger labels bootstrap workflow
        uses: actions/github-script@v7
        with:
          script: |
            const ref = context.payload.repository.default_branch || "main";
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "bootstrap-labels.yml",
              ref
            });

      - name: Comment bootstrap completion
        uses: actions/github-script@v7
        env:
          HAS_CHANGES: ${{ steps.detect_changes.outputs.has_changes }}
          PR_URL: ${{ steps.create_pr.outputs.pull-request-url }}
        with:
          script: |
            const hasChanges = process.env.HAS_CHANGES === "true";
            const prUrl = process.env.PR_URL;
            const contextMsg = hasChanges
              ? (prUrl
                  ? `Arquivos de contexto gerados. PR criado: ${prUrl}`
                  : "Arquivos de contexto gerados e commitados.")
              : "Nenhuma alteração de contexto foi detectada (sem diff nos arquivos em `.ai/context/*`).";

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                "Bootstrap arquitetural processado.",
                "",
                contextMsg,
                "Workflow `Bootstrap Labels` disparado para sincronizar labels."
              ].join("\\n")
            });
