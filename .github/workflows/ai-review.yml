name: AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
        type: string

permissions:
  id-token: write
  actions: write
  contents: read
  pull-requests: write
  issues: write
  checks: write
  statuses: write

concurrency:
  group: ai-review-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.event.review.pull_request_url || github.run_id }}
  cancel-in-progress: true

jobs:
  resolve-pr-context:
    if: github.event_name != 'pull_request_review'
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      pr_title: ${{ steps.resolve.outputs.pr_title }}
      pr_body: ${{ steps.resolve.outputs.pr_body }}
      pr_draft: ${{ steps.resolve.outputs.pr_draft }}
      pr_head_ref: ${{ steps.resolve.outputs.pr_head_ref }}
      pr_head_sha: ${{ steps.resolve.outputs.pr_head_sha }}
      pr_url: ${{ steps.resolve.outputs.pr_url }}
    steps:
      - name: Resolve PR context
        id: resolve
        uses: actions/github-script@v7
        env:
          INPUT_PR_NUMBER: ${{ github.event.inputs.pr_number }}
        with:
          script: |
            let pr;
            if (context.eventName === "workflow_dispatch") {
              const pullNumber = Number(process.env.INPUT_PR_NUMBER);
              const response = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pullNumber
              });
              pr = response.data;
            } else {
              pr = context.payload.pull_request;
            }

            core.setOutput("pr_number", String(pr.number));
            core.setOutput("pr_title", pr.title || "");
            core.setOutput("pr_body", pr.body || "");
            core.setOutput("pr_draft", String(Boolean(pr.draft)));
            core.setOutput("pr_head_ref", pr.head?.ref || "");
            core.setOutput("pr_head_sha", pr.head?.sha || "");
            core.setOutput("pr_url", pr.html_url || "");

  ai-review:
    needs: resolve-pr-context
    name: ai-review
    if: needs.resolve-pr-context.outputs.pr_draft != 'true'
    runs-on: ubuntu-latest
    env:
      AI_REVIEW_PROMPT: |
        You are the AI review agent for this repository.

        Read and follow:
        - .ai/agents/qa.md
        - .ai/policies/workflows.yml
        - .ai/context/project-brief.md if it exists
        - .ai/context/architecture.md if it exists
        - .ai/context/stack.md if it exists
        - .ai/context/coding-style.md if it exists
        - .ai/context/security.md if it exists

        Review this pull request strictly.

        Pull request title:
        ${{ needs.resolve-pr-context.outputs.pr_title }}

        Pull request body:
        ${{ needs.resolve-pr-context.outputs.pr_body }}

        Requirements:
        - Evaluate scope control
        - Evaluate risk of regressions
        - Evaluate code quality
        - Evaluate adherence to architecture and project context
        - Evaluate whether tests are sufficient

        Output format:
        VERDICT: PASS or VERDICT: FAIL
        SUMMARY:
        <short review summary>
        REQUIRED_CHANGES:
        <use "None" when verdict is PASS>

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-pr-context.outputs.pr_head_sha }}
          fetch-depth: 0

      - name: Resolve AI configuration
        id: ai_config
        shell: bash
        env:
          AI_PROVIDER: ${{ vars.AI_PROVIDER }}
          AI_MODEL: ${{ vars.AI_MODEL }}
          AI_MODEL_VERSION: ${{ vars.AI_MODEL_VERSION }}
          AI_MODEL_ID: ${{ vars.AI_MODEL_ID }}
        run: .github/scripts/resolve-ai-config.sh

      - name: Print AI configuration
        shell: bash
        run: |
          echo "AI provider: ${{ steps.ai_config.outputs.provider }}"
          echo "AI model: ${{ steps.ai_config.outputs.model_id }}"

      - name: Run Claude Code review
        id: claude_review
        if: steps.ai_config.outputs.provider == 'claude'
        uses: anthropics/claude-code-base-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: ${{ steps.ai_config.outputs.model_id }}
          allowed_tools: "Bash(git diff:*),View,GlobTool,GrepTool"
          prompt: ${{ env.AI_REVIEW_PROMPT }}

      - name: Run Codex review
        id: gpt_review
        if: steps.ai_config.outputs.provider == 'gpt'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: ${{ steps.ai_config.outputs.model_id }}
          sandbox: read-only
          prompt: ${{ env.AI_REVIEW_PROMPT }}

      - name: Run Gemini CLI review
        id: gemini_review
        if: steps.ai_config.outputs.provider == 'gemini'
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: ${{ steps.ai_config.outputs.model_id }}
          prompt: ${{ env.AI_REVIEW_PROMPT }}

      - name: Run Grok review
        id: grok_review
        if: steps.ai_config.outputs.provider == 'grok'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.XAI_API_KEY }}
          responses-api-endpoint: https://api.x.ai/v1/responses
          model: ${{ steps.ai_config.outputs.model_id }}
          sandbox: read-only
          prompt: ${{ env.AI_REVIEW_PROMPT }}

      - name: Capture review summary
        id: review_summary
        if: always()
        shell: bash
        env:
          CLAUDE_EXECUTION_FILE: ${{ steps.claude_review.outputs.execution_file }}
          GPT_SUMMARY: ${{ steps.gpt_review.outputs['final-message'] }}
          GEMINI_SUMMARY: ${{ steps.gemini_review.outputs.summary }}
          GROK_SUMMARY: ${{ steps.grok_review.outputs['final-message'] }}
        run: |
          summary=""
          if [ -n "${CLAUDE_EXECUTION_FILE:-}" ] && [ -f "$CLAUDE_EXECUTION_FILE" ]; then
            summary="$(python3 - <<'PY'
            import json
            import os

            path = os.environ["CLAUDE_EXECUTION_FILE"]
            with open(path, "r", encoding="utf-8") as fh:
                log = json.load(fh)

            review = ""
            for item in reversed(log):
                if item.get("role") != "assistant":
                    continue
                content = item.get("content", "")
                if isinstance(content, str):
                    review = content
                    break
                if isinstance(content, list):
                    parts = []
                    for part in content:
                        if isinstance(part, dict) and part.get("type") == "text":
                            parts.append(part.get("text", ""))
                    review = "\n".join(part for part in parts if part).strip()
                    if review:
                        break

            print(review)
          PY
          )"
          fi
          if [ -z "$summary" ]; then summary="${GPT_SUMMARY:-}"; fi
          if [ -z "$summary" ]; then summary="${GEMINI_SUMMARY:-}"; fi
          if [ -z "$summary" ]; then summary="${GROK_SUMMARY:-}"; fi
          if [ -n "$summary" ]; then
            {
              echo "summary<<EOF"
              echo "$summary"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Publish review summary
        if: steps.review_summary.outputs.summary != ''
        uses: actions/github-script@v7
        env:
          REVIEW_SUMMARY: ${{ steps.review_summary.outputs.summary }}
          AI_PROVIDER: ${{ steps.ai_config.outputs.provider }}
          AI_MODEL_ID: ${{ steps.ai_config.outputs.model_id }}
        with:
          script: |
            const reviewSummary = process.env.REVIEW_SUMMARY;
            const aiProvider = process.env.AI_PROVIDER;
            const aiModelId = process.env.AI_MODEL_ID;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number("${{ needs.resolve-pr-context.outputs.pr_number }}"),
              body: [
                `AI review (${aiProvider}/${aiModelId})`,
                "",
                reviewSummary
              ].join("\n")
            });

      - name: Parse review verdict
        id: verdict
        if: always()
        shell: bash
        env:
          REVIEW_SUMMARY: ${{ steps.review_summary.outputs.summary }}
        run: |
          verdict="UNKNOWN"
          if printf '%s\n' "$REVIEW_SUMMARY" | grep -Eq '^VERDICT:[[:space:]]*FAIL'; then
            verdict="FAIL"
          elif printf '%s\n' "$REVIEW_SUMMARY" | grep -Eq '^VERDICT:[[:space:]]*PASS'; then
            verdict="PASS"
          fi
          echo "verdict=$verdict" >> "$GITHUB_OUTPUT"

      - name: Resolve linked issue
        id: linked_issue
        if: steps.verdict.outputs.verdict == 'FAIL'
        uses: actions/github-script@v7
        env:
          PR_BODY: ${{ needs.resolve-pr-context.outputs.pr_body }}
        with:
          script: |
            const body = process.env.PR_BODY || "";
            const match = body.match(/Source issue:\s*#(\d+)/i);
            if (match) {
              core.setOutput("issue_number", match[1]);
            }

      - name: Request dev fix cycle from AI review
        if: steps.verdict.outputs.verdict == 'FAIL' && steps.linked_issue.outputs.issue_number != ''
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ steps.linked_issue.outputs.issue_number }}
          REVIEW_SUMMARY: ${{ steps.review_summary.outputs.summary }}
          PR_NUMBER: ${{ needs.resolve-pr-context.outputs.pr_number }}
          PR_URL: ${{ needs.resolve-pr-context.outputs.pr_url }}
        with:
          script: |
            const issueNumber = Number(process.env.ISSUE_NUMBER);
            const body = [
              `AI review flagged PR #${process.env.PR_NUMBER} for changes.`,
              process.env.PR_URL,
              "",
              "A new dev fix cycle was requested with label `dev:fix_review`.",
              "",
              process.env.REVIEW_SUMMARY
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ["dev:fix_review"]
            });

      - name: Fail when AI review does not pass
        if: steps.verdict.outputs.verdict != 'PASS'
        shell: bash
        run: |
          echo "AI review verdict was ${{ steps.verdict.outputs.verdict }}."
          exit 1

      - name: Mark success
        if: success()
        run: echo "AI review passed"

      - name: Trigger QA workflow after AI review success
        if: success()
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ needs.resolve-pr-context.outputs.pr_number }}
        with:
          github-token: ${{ secrets.MAI_BOT_TOKEN || github.token }}
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            const query = `
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    reviewDecision
                  }
                }
              }
            `;

            const result = await github.graphql(query, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              number: prNumber
            });

            if (result.repository.pullRequest?.reviewDecision !== "APPROVED") {
              core.info("Skipping QA dispatch because human approval is not present yet.");
              return;
            }

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "qa-agent.yml",
              ref: "dev",
              inputs: {
                pr_number: process.env.PR_NUMBER
              }
            });

  human-review-feedback:
    if: github.event_name == 'pull_request_review' && github.event.review.state == 'changes_requested'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve linked issue
        id: linked_issue
        uses: actions/github-script@v7
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        with:
          script: |
            const body = process.env.PR_BODY || "";
            const match = body.match(/Source issue:\s*#(\d+)/i);
            if (match) {
              core.setOutput("issue_number", match[1]);
            }

      - name: Request dev fix cycle from human review
        if: steps.linked_issue.outputs.issue_number != ''
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ steps.linked_issue.outputs.issue_number }}
          REVIEW_BODY: ${{ github.event.review.body }}
          REVIEWER: ${{ github.event.review.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        with:
          script: |
            const issueNumber = Number(process.env.ISSUE_NUMBER);
            const reviewBody = process.env.REVIEW_BODY || "No review body provided.";
            const body = [
              `Human review requested changes on PR #${process.env.PR_NUMBER} by @${process.env.REVIEWER}.`,
              process.env.PR_URL,
              "",
              "A new dev fix cycle was requested with label `dev:fix_review`.",
              "",
              reviewBody
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ["dev:fix_review"]
            });
